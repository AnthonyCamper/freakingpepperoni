<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Freaking Pepperoni</title>
    <!-- GitHub Pages SPA fallback (rafgraph/spa-github-pages). For any unknown
         path, GitHub serves this file; we encode the requested path into a query
         string and bounce to the app's index, which decodes it (see index.html)
         and hands a clean URL to BrowserRouter.
         pathSegmentsToKeep = 1 keeps the /freakingpepperoni/ project-page base.
         On a custom domain served at the root, set it to 0. -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        )
      })()
    </script>
  </head>
  <body></body>
</html>
