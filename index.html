<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#faf9f5" />
    <title>Freaking Pepperoni</title>
    <meta name="description" content="A family recipe archive. The good stuff, written down before it gets lost." />
    <meta property="og:site_name" content="Freaking Pepperoni" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Freaking Pepperoni" />
    <meta property="og:description" content="A family recipe archive. The good stuff, written down before it gets lost." />
    <meta name="twitter:card" content="summary" />
    <!-- SPA deep-link restore: GitHub Pages serves 404.html for unknown paths,
         which encodes the real path into ?/...; decode it back before the router
         boots so /recipe/:slug loads directly. Keep in sync with public/404.html. -->
    <script>
      (function () {
        var l = window.location
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts non-render-blocking: preload as style, then flip to stylesheet
         on load. display=swap keeps text visible meanwhile. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600;700&family=Public+Sans:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600;700&family=Public+Sans:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
